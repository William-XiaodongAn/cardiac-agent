<script id='click' type='x-shader-fragment'>#version 300 es
precision highp float ;
precision highp int ;

uniform sampler2D   inTexture ;
uniform vec2    clickPosition ;
uniform float   clickRadius ;

in vec2 cc, pixPos ;

layout (location = 0) out vec4 ocolor ;

#define u   color.r
#define v   color.g
#define w   color.b

// Main body of the shader
void main() {
    vec2  size  = vec2(textureSize(inTexture, 0)) ;

    // read the color of the pixel .......................................
    vec4 color = texture( inTexture , cc ) ;

    if ( length(clickPosition - cc )< clickRadius ){
        u = 1. ;
    }

    // output the color of the pixel .....................................
    ocolor = color ;
    return ;
}

</script><script id='init' type='shader'>#version 300 es
precision highp float ;
precision highp int ;

in vec2 cc, pixPos ;

layout (location = 0) out vec4 color1 ;
layout (location = 1) out vec4 color2 ;
layout (location = 2) out vec4 color3 ;
layout (location = 3) out vec4 color4 ;
layout (location = 4) out vec4 color5 ;
// Main body of the shader
void main() {
    vec4 color = vec4(0.) ;
    
    color.r = 0. ;
	color.g = 0. ;
	color.b = 0. ;

	color1 = color ;
    color2 = color ;
    color3 = color ;
    color4 = color ;
    color5 = color ;
    return ;
}
</script>

<script id='march' type='shader'>#version 300 es
precision highp float;
precision highp int;

uniform sampler2D inTexture1;
uniform sampler2D inTexture2;
uniform sampler2D inTexture3;
uniform sampler2D inTexture4;
uniform sampler2D inTexture5;

uniform float dt, dx, dy;

in vec2 cc, pixPos;

layout (location = 0) out vec4 ocolor1;
layout (location = 1) out vec4 ocolor2;
layout (location = 2) out vec4 ocolor3;
layout (location = 3) out vec4 ocolor4;
layout (location = 4) out vec4 ocolor5;

// constants
const float Ko = 5.4;
const float Cao = 2.0;
const float Nao = 140.0;
const float Vc = 0.016404;
const float Vsr = 0.001094;
const float Vss = 5.468e-05;
const float Bufc = 0.2;
const float Kbufc = 0.001;
const float Bufsr = 10.0;
const float Kbufsr = 0.3;
const float Bufss = 0.4;
const float Kbufss = 0.00025;
const float Vmaxup = 0.006375;
const float Kup = 0.00025;
const float Vrel = 0.102;
const float k3 = 0.06;
const float k4 = 0.005;
const float k1prime = 0.15;
const float k2prime = 0.045;
const float EC = 1.5;
const float maxsr = 2.5;
const float minsr = 1.0;
const float Vleak = 0.00036;
const float Vxfer = 0.0038;
const float RR = 8314.3;
const float FF = 96486.7;
const float TT = 310.0;
const float CAPACITANCE = 0.185;
const float Gks = 0.392;
const float Gto = 0.294;
const float Gkr = 0.153;
const float pKNa = 0.03;
const float GK1 = 5.405;
const float alphanaca = 0.0;
const float GNa = 14.838;
const float GbNa = 0.00029;
const float KmK = 1.0;
const float KmNa = 40.0;
const float knak = 2.724;
const float GCaL = 3.98e-05;
const float GbCa = 0.000592;
const float knaca = 1000.0;
const float KmNai = 87.5;
const float KmCa = 1.38;
const float ksat = 0.1;
const float n = 0.35;
const float GpCa = 0.1238;
const float KpCa = 0.0005;
const float GpK = 0.0146;
const float diffCoef = 0.001;

// helper for clamped neighbour coordinates (Neumann BC)
vec2 clampCoord(vec2 p) {
    return clamp(p, vec2(0.0), vec2(1.0));
}

void main() {
    // texture size for neighbour offsets
    vec2 size = vec2(textureSize(inTexture1, 0));
    vec2 ii = vec2(1.0, 0.0) / size;
    vec2 jj = vec2(0.0, 1.0) / size;

    // read state variables
    vec4 col1 = texture(inTexture1, cc);
    vec4 col2 = texture(inTexture2, cc);
    vec4 col3 = texture(inTexture3, cc);
    vec4 col4 = texture(inTexture4, cc);
    vec4 col5 = texture(inTexture5, cc);

    float V   = col1.r;
    float sRR = col1.g;
    float Nai = col1.b;
    float Ki  = col1.a;

    float Cai  = col2.r;
    float CaSS = col2.g;
    float CaSR = col2.b;
    float ISumCa = col2.a;

    float sm   = col3.r;
    float sh   = col3.g;
    float sj   = col3.b;
    float sxs  = col3.a;

    float sd    = col4.r;
    float sf    = col4.g;
    float sf2   = col4.b;
    float sfcass= col4.a;

    float sr   = col5.r;
    float ss   = col5.g;
    float sxr1 = col5.b;
    float sxr2 = col5.a;

    // derived constants
    float invVcF2 = 1.0 / (2.0 * Vc * FF);
    float invVcF  = 1.0 / (Vc * FF);
    float invvssF2 = 1.0 / (2.0 * Vss * FF);
    float rtof = RR * TT / FF;
    float fort = 1.0 / rtof;
    float KmNai3 = pow(KmNai, 3.0);
    float Nao3   = pow(Nao, 3.0);
    float Gkrfactor = sqrt(Ko / 5.4);

    // ---- Gating variables updates ----
    // m (sm)
    float AM = 1.0 / (1.0 + exp((-60.0 - V) / 5.0));
    float BM = 0.1 / (1.0 + exp((V + 35.0) / 5.0)) + 0.10 / (1.0 + exp((V - 50.0) / 200.0));
    float minft = 1.0 / pow(1.0 + exp((-56.86 - V) / 9.03), 2.0);
    float tau_M = AM * BM;
    float exptaumt = exp(-dt / tau_M);
    sm = minft - (minft - sm) * exptaumt;

    // h (sh)
    float hinft = 1.0 / pow(1.0 + exp((V + 71.55) / 7.43), 2.0);
    float AH = (V >= -40.0) ? 0.0 : 0.057 * exp(-(V + 80.0) / 6.8);
    float BH = (V >= -40.0) ?
        0.77 / (0.13 * (1.0 + exp(-(V + 10.66) / 11.1))) :
        (2.7 * exp(0.079 * V) + 3.1e5 * exp(0.3485 * V));
    float tau_H = 1.0 / (AH + BH);
    float exptauht = exp(-dt / tau_H);
    sh = hinft - (hinft - sh) * exptauht;

    // j (sj)
    float AJ = (V >= -40.0) ? 0.0 :
        ((-2.5428e4 * exp(0.2444 * V) - 6.948e-6 * exp(-0.04391 * V)) * (V + 37.78))
        / (1.0 + exp(0.311 * (V + 79.23)));
    float BJ = (V >= -40.0) ?
        (0.6 * exp(0.057 * V) / (1.0 + exp(-0.1 * (V + 32.0))) :
        (0.02424 * exp(-0.01052 * V) / (1.0 + exp(-0.1378 * (V + 40.14))));
    float tau_J = 1.0 / (AJ + BJ);
    float exptaujt = exp(-dt / tau_J);
    sj = hinft - (hinft - sj) * exptaujt; // Note: using hinft as placeholder

    // xs (sxs)
    float xsinft = 1.0 / (1.0 + exp((-5.0 - V) / 14.0));
    float Axs = 1400.0 / sqrt(1.0 + exp((5.0 - V) / 6.0));
    float Bxs = 1.0 / (1.0 + exp((V - 35.0) / 15.0));
    float tau_Xs = Axs * Bxs + 80.0;
    float exptauxst = exp(-dt / tau_Xs);
    sxs = xsinft - (xsinft - sxs) * exptauxst;

    // d (sd)
    float dinft = 1.0 / (1.0 + exp((-8.0 - V) / 7.5));
    float Ad = 1.4 / (1.0 + exp((-35.0 - V) / 13.0)) + 0.25;
    float Bd = 1.4 / (1.0 + exp((V + 5.0) / 5.0));
    float Cd = 1.0 / (1.0 + exp((50.0 - V) / 20.0));
    float tau_D = Ad * Bd + Cd;
    float exptaudt = exp(-dt / tau_D);
    sd = dinft - (dinft - sd) * exptaudt;

    // f (sf)
    float finft = 1.0 / (1.0 + exp((V + 20.0) / 7.0));
    float Af = 1102.5 * exp(-pow(V + 27.0, 2.0) / 225.0);
    float Bf = 200.0 / (1.0 + exp((13.0 - V) / 10.0));
    float Cf = 180.0 / (1.0 + exp((V + 30.0) / 10.0)) + 20.0;
    float tau_F = Af + Bf + Cf;
    float exptauft = exp(-dt / tau_F);
    sf = finft - (finft - sf) * exptauft;

    // f2 (sf2)
    float f2inft = 0.67 / (1.0 + exp((V + 35.0) / 7.0)) + 0.33;
    float Af2 = 600.0 * exp(-pow(V + 25.0, 2.0) / 49.0);
    float Bf2 = 31.0 / (1.0 + exp((25.0 - V) / 10.0));
    float Cf2 = 16.0 / (1.0 + exp((V + 30.0) / 10.0));
    float tau_F2 = Af2 + Bf2 + Cf2;
    float exptauf2t = exp(-dt / tau_F2);
    sf2 = f2inft - (f2inft - sf2) * exptauf2t;

    // fcass (sfcass)
    float casshi = 1.0;
    float FCaSS_INF = (CaSS >= casshi) ? 0.4 :
        (0.6 / (1.0 + pow(CaSS / 0.05, 2.0)) + 0.4);
    float tau_fcass = (CaSS >= casshi) ? 2.0 :
        (80.0 / (1.0 + pow(CaSS / 0.05, 2.0)) + 2.0);
    float exptaufcassinf = exp(-dt / 2.0);
    float exptaufcasst = exp(-dt / tau_fcass);
    float exptaufcass = (CaSS >= casshi) ? exptaufcassinf : exptaufcasst;
    sfcass = FCaSS_INF - (FCaSS_INF - sfcass) * exptaufcass;

    // r (sr) and s (ss)
    float rinft = 1.0 / (1.0 + exp((20.0 - V) / 6.0));
    float sinft = 1.0 / (1.0 + exp((V + 20.0) / 5.0));
    float tau_R = 9.5 * exp(-pow((V + 40.0), 2.0) / 1800.0) + 0.8;
    float tau_S = 85.0 * exp(-pow((V + 45.0), 2.0) / 320.0) + 5.0 / (1.0 + exp((V - 20.0) / 5.0)) + 3.0;
    float exptaurt = exp(-dt / tau_R);
    float exptaust = exp(-dt / tau_S);
    sr = rinft - (rinft - sr) * exptaurt;
    ss = sinft - (sinft - ss) * exptaust;

    // xr1 (sxr1)
    float xr1inft = 1.0 / (1.0 + exp((-26.0 - V) / 7.0));
    float axr1 = 450.0 / (1.0 + exp((-45.0 - V) / 10.0));
    float bxr1 = 6.0 / (1.0 + exp((V + 30.0) / 11.5));
    float tau_Xr1 = axr1 * bxr1;
    float exptauxr1t = exp(-dt / tau_Xr1);
    sxr1 = xr1inft - (xr1inft - sxr1) * exptauxr1t;

    // xr2 (sxr2)
    float xr2inft = 1.0 / (1.0 + exp((V + 88.0) / 24.0));
    float axr2 = 3.0 / (1.0 + exp((-60.0 - V) / 20.0));
    float bxr2 = 1.12 / (1.0 + exp((V - 60.0) / 20.0));
    float tau_Xr2 = axr2 * bxr2;
    float exptauxr2t = exp(-dt / tau_Xr2);
    sxr2 = xr2inft - (xr2inft - sxr2) * exptauxr2t;

    // ---- Electrophysiology ----
    float Ek = rtof * log(Ko / Ki);
    float Ena = rtof * log(Nao / Nai);
    float Eks = rtof * log((Ko + pKNa * Nao) / (Ki + pKNa * Nai));
    float Eca = 0.5 * rtof * log(Cao / Cai);

    float INa = GNa * pow(sm, 3.0) * sh * sj * (V - Ena);
    float IKr = Gkr * Gkrfactor * sxr1 * sxr2 * (V - Ek);
    float IKs = Gks * pow(sxs, 2.0) * (V - Eks);
    float Ito = Gto * sr * ss * (V - Ek);

    float vmek = V - Ek;
    float Ak1 = 0.1 / (1.0 + exp(0.06 * (vmek - 200.0)));
    float Bk1 = (3.0 * exp(0.0002 * (vmek + 100.0)) + exp(0.1 * (vmek - 10.0))) / (1.0 + exp(-0.5 * vmek));
    float ik1coefft = GK1 * Ak1 / (Ak1 + Bk1);
    float IK1 = ik1coefft * (V - Ek);

    float ipkcoefft = GpK / (1.0 + exp((25.0 - V) / 5.98));
    float IpK = ipkcoefft * (V - Ek);

    float IbNa = GbNa * (V - Ena);
    float inakcoefft = (1.0 / (1.0 + 0.1245 * exp(-0.1 * V * fort) + 0.0353 * exp(-V * fort))) *
                       knak * (Ko / (Ko + KmK));
    float INaK = inakcoefft * (Nai / (Nai + KmNa));

    float temp = exp((n - 1.0) * V * fort);
    float temp2 = knaca / ((KmNai3 + Nao3) * (KmCa + Cao) * (1.0 + ksat * temp));
    float inaca1t = temp2 * exp(n * V * fort) * Cao;
    float inaca2t = temp2 * temp * Nao3 * alphanaca;
    float INaCa = inaca1t * pow(Nai, 3.0) - inaca2t * Cai;

    // Calcium handling currents
    float temp_ical = exp(2.0 * (V - 15.0) * fort);
    float ical1t, ical2t;
    if (abs(V - 15.0) < 1e-4) {
        ical1t = GCaL * 4.0e-4 * (FF * fort) *
                 (0.25 * exp(2.0e-4 * fort) / (exp(2.0e-4 * fort) - 1.0));
        ical2t = GCaL * 4.0e-4 * (FF * fort) *
                 (Cao / (exp(2.0e-4 * fort) - 1.0));
    } else {
        ical1t = GCaL * 4.0 * (V - 15.0) * (FF * fort) *
                 (0.25 * temp_ical / (temp_ical - 1.0));
        ical2t = GCaL * 4.0 * (V - 15.0) * (FF * fort) *
                 (Cao / (temp_ical - 1.0));
    }
    float ICaL = sd * sf * sf2 * sfcass * (ical1t * CaSS - ical2t);
    float IpCa = GpCa * Cai / (KpCa + Cai);
    float IbCa = GbCa * (V - Eca);

    // Ryanodine receptor and SR dynamics
    float kCaSR = maxsr - (maxsr - minsr) / (1.0 + pow(EC / CaSR, 2.0));
    float k1 = k1prime / kCaSR;
    float k2 = k2prime * kCaSR;
    float dRR = k4 * (1.0 - sRR) - k2 * CaSS * sRR;
    float sRR_new = sRR + dt * dRR;
    float sOO = (k1 * CaSS * CaSS * sRR_new) / (k3 + k1 * CaSS * CaSS);
    float Irel = Vrel * sOO * (CaSR - CaSS);
    float Ileak = Vleak * (CaSR - Cai);
    float Iup = Vmaxup / (1.0 + pow(Kup / Cai, 2.0));
    float Ixfer = Vxfer * (CaSS - Cai);
    float CaCSQN = Bufsr * CaSR / (CaSR + Kbufsr);
    float dCaSR = dt * (Iup - Irel - Ileak);
    float bjsr = Bufsr - CaCSQN - dCaSR - CaSR + Kbufsr;
    float cjsr = Kbufsr * (CaCSQN + dCaSR + CaSR);
    float CaSR_new = (sqrt(bjsr * bjsr + 4.0 * cjsr) - bjsr) / 2.0;

    // Subspace Ca
    float CaSSBuf = Bufss * CaSS / (CaSS + Kbufss);
    float dCaSS = dt * (-Ixfer * (Vc / Vss) + Irel * (Vsr / Vss) -
                       ICaL * invvssF2 * CAPACITANCE);
    float bcss = Bufss - CaSSBuf - dCaSS - CaSS + Kbufss;
    float ccss = Kbufss * (CaSSBuf + dCaSS + CaSS);
    float CaSS_new = (sqrt(bcss * bcss + 4.0 * ccss) - bcss) / 2.0;

    // Cytosolic Ca
    float CaBuf = Bufc * Cai / (Cai + Kbufc);
    float dCai = dt * (-(IbCa + IpCa - 2.0 * INaCa) * invVcF2 * CAPACITANCE
                      - (Iup - Ileak) * (Vsr / Vc) + Ixfer);
    float bc = Bufc - CaBuf - dCai - Cai + Kbufc;
    float cc = Kbufc * (CaBuf + dCai + Cai);
    float Cai_new = (sqrt(bc * bc + 4.0 * cc) - bc) / 2.0;

    float ISumCa_new = ICaL + IpCa + IbCa;

    // Ionic sum for voltage
    float ISumNaK = INa + IbNa + INaK + IK1 + IKr + IKs + IpK + Ito;
    float I_sum = ISumCa_new + ISumNaK + INaCa;

    // Update intracellular Na and K
    float dNai = -(INa + IbNa + 3.0 * INaK + 3.0 * INaCa) * invVcF * CAPACITANCE;
    float Nai_new = Nai + dt * dNai;
    float Istim = 0.0;
    float dKi = -(Istim + IK1 + Ito + IKr + IKs - 2.0 * INaK + IpK) * invVcF * CAPACITANCE;
    float Ki_new = Ki + dt * dKi;

    // ---- Diffusion (Neumann) ----
    float Vcenter = V;
    float Vleft  = texture(inTexture1, clampCoord(cc - ii)).r;
    float Vright = texture(inTexture1, clampCoord(cc + ii)).r;
    float Vdown  = texture(inTexture1, clampCoord(cc - jj)).r;
    float Vup    = texture(inTexture1, clampCoord(cc + jj)).r;

    float laplacian = (Vright - 2.0 * Vcenter + Vleft) / (dx * dx)
                    + (Vup    - 2.0 * Vcenter + Vdown) / (dy * dy);
    float dVlt2dt = diffCoef * laplacian - I_sum;
    float V_new = V + dt * dVlt2dt;

    // ---- Write outputs ----
    ocolor1 = vec4(V_new, sRR_new, Nai_new, Ki_new);
    ocolor2 = vec4(Cai_new, CaSS_new, CaSR_new, ISumCa_new);
    ocolor3 = vec4(sm, sh, sj, sxs);
    ocolor4 = vec4(sd, sf, sf2, sfcass);
    ocolor5 = vec4(sr, ss, sxr1, sxr2);
}
</script>

<script>
function source(id){
    return document.getElementById(id).text ;
}

var canvas_1 = document.getElementById('canvas_1') ;
canvas_1.style.left = "10px";
canvas_1.style.top = "10px";
canvas_1.style.position = "absolute";

var canvas_2 = document.getElementById('canvas_2') ;
canvas_2.style.left = "532px";
canvas_2.style.top = "10px";
canvas_2.style.position = "absolute";


// dont change anything here ............................................
var env = {
        dt : 0.025 ,
        time : 0 ,
        dx : 0.0234375,
        running : false ,
		width : 512,
		height : 512,
		clickRadius : 0.06 ,
		clickPosition  : [0.,0.] ,
		skip : 40,
  } ;
// ---------------------------------------------------------------


// defining the textures .................................................
env.fcolor0 = new Abubu.Float32Texture(env.width,env.height) ;
env.scolor0 = new Abubu.Float32Texture(env.width,env.height) ;
env.fcolor0.pairable = true ;
env.scolor0.pairable = true ;

env.fcolor1 = new Abubu.Float32Texture(env.width,env.height) ;
env.scolor1 = new Abubu.Float32Texture(env.width,env.height) ;
env.fcolor1.pairable = true ;
env.scolor1.pairable = true ;

env.fcolor2 = new Abubu.Float32Texture(env.width,env.height) ;
env.scolor2 = new Abubu.Float32Texture(env.width,env.height) ;
env.fcolor2.pairable = true ;
env.scolor2.pairable = true ;

env.fcolor3 = new Abubu.Float32Texture(env.width,env.height) ;
env.scolor3 = new Abubu.Float32Texture(env.width,env.height) ;
env.fcolor3.pairable = true ;
env.scolor3.pairable = true ;

env.fcolor4 = new Abubu.Float32Texture(env.width,env.height) ;
env.scolor4 = new Abubu.Float32Texture(env.width,env.height) ;
env.fcolor4.pairable = true ;
env.scolor4.pairable = true ;

var texture_num = 5;

env.fcolors = [] ;
env.scolors = [] ;
for(var i=0; i<texture_num; i++){
    env['fcolor'+i] = new Abubu.Float32Texture( 
            env.width, env.height, { pairable : true } ) ;
    env['scolor'+i] = new Abubu.Float32Texture( 
            env.width, env.height, { pairable : true } ) ;
    env.fcolors.push(env['fcolor'+i]) ;
    env.scolors.push(env['scolor'+i]) ;
}

// Setup a solver ........................................................
var init = new Abubu.Solver( {
    fragmentShader  : source('init'),
    targets : {
        color1 : { location :0, target : env.fcolor0  } ,
        color2 : { location :1, target : env.fcolor1  } ,
        color3 : { location :2, target : env.fcolor2  } ,
        color4 : { location :3, target : env.fcolor3  } ,
        color5 : { location :4, target : env.fcolor4  } ,
    }
} ) ;
init.render();

// post processing .......................................................
var plot = new Abubu.Plot2D({
    target : env.fcolor0,
    prevTarget: env.scolor0,
    channel : 'r',
    minValue : -1.0 ,
    maxValue : 1.0 ,
    colorbar : true ,
    probeVisible : true ,
    canvas : canvas_1 ,
}) ;
plot.init() ;
plot.render() ;

function marchUniforms(_inTexture1,_inTexture2,_inTexture3,_inTexture4,_inTexture5){
    this.inTexture1         = { type : 't', value : _inTexture1          } ;
    this.inTexture2         = { type : 't', value : _inTexture2          } ;
    this.inTexture3         = { type : 't', value : _inTexture3          } ;
    this.inTexture4         = { type : 't', value : _inTexture4          } ;
    this.inTexture5         = { type : 't', value : _inTexture5          } ;
    this.dt                 = { type : 'f', value : env.dt              } ;
	this.dx                 = { type : 'f', value : env.dx          } ;
	this.dy                 = { type : 'f', value : env.dx          } ;
    return this ;
}

var fmarch = new Abubu.Solver({
        fragmentShader : source( 'march' ) ,
		uniforms : new marchUniforms( env.fcolor0,env.fcolor1,env.fcolor2,env.fcolor3,env.fcolor4 ) ,
        targets : { 
            ocolor1 : { location : 0, target : env.scolor0 },
            ocolor2 : { location : 1, target : env.scolor1 },
            ocolor3 : { location : 2, target : env.scolor2 },
            ocolor4 : { location : 3, target : env.scolor3 },
            ocolor5 : { location : 4, target : env.scolor4 },
        
        }
    } ) ;

var smarch = new Abubu.Solver({
        fragmentShader : source( 'march' ) ,
  		uniforms : new marchUniforms( env.scolor0,env.scolor1,env.scolor2,env.scolor3,env.scolor4 ) ,
        targets : { 
            ocolor1 : { location : 0, target : env.fcolor0 },
            ocolor2 : { location : 1, target : env.fcolor1 },
            ocolor3 : { location : 2, target : env.fcolor2 },
            ocolor4 : { location : 3, target : env.fcolor3 },
            ocolor5 : { location : 4, target : env.fcolor4 },
        
        }
    } ) ;

function march(){
    fmarch.render() ;
    env.time += env.dt ;
    smarch.render() ;
    env.time += env.dt ;
}

env.csvFileName = 'result.csv' ;
env.saveCsvFile = function() {
    data = env.fcolor0.value.toString() ;

    // 3. CRITICAL: Pass the array directly to the Blob. 
    // This avoids creating one giant mega-string in memory.
    const blob = new Blob([data], { type: 'text/csv;charset=utf-8' });

    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');

    const name_download = 'result.csv';

    link.href = url;
    link.download = name_download;

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    URL.revokeObjectURL(url); // Cleanup
};



//IC
const IC_url = './random_sample_t0.csv';
const T_end = 2;
//IC

function loadCsv(url) {
    // fetch starts the request and "promises" to get back to you
    fetch(url)
        .then(response => response.text()) // Convert the raw response to text
        .then(csvText => {
            // This code runs ONLY after the file is fully loaded
            processCsvData(csvText); 
        })
        .catch(error => console.error("Error:", error));
}

function processCsvData(result) {
    var data = result.split(',');
    var width = parseInt(data[0]);
    var height = parseInt(data[1]);

    var tabs = [];
    for (var i = 0; i < texture_num; i++) {
        tabs.push(new Float32Array(width * height * 4));
    }

    var p = 2;
    var indx;

    for (var j = 0; j < texture_num; j++) {
        for (var i = 0; i < (width * height); i++) {
            indx = i * 4;
            tabs[j][indx]     = parseFloat(data[p++]);
            tabs[j][indx + 1] = parseFloat(data[p++]);
            tabs[j][indx + 2] = parseFloat(data[p++]);
            tabs[j][indx + 3] = parseFloat(data[p++]);
        }
    }

    for (var j = 0; j < texture_num; j++) {
        env.fcolors[j].data = tabs[j];
        env.scolors[j].data = tabs[j];
    }
}

loadCsv(IC_url) ;

function run(){
    if (env.running){
        for(var i = 0 ; i<env.skip ; i++){

            if (env.time >= T_end){
                env.running = false ;
                console.log("Simulation finished!")
                env.saveCsvFile();
                break ;
            }
            march() ;
        }

    }
    plot.render() ;
    requestAnimationFrame(run) ;
}

// click solver ..........................................................
var click = new Abubu.Solver({
    fragmentShader : source( 'click' ) ,
    uniforms : {
        inTexture : { type : 't', value : env.fcolor0 } ,
        clickRadius: { type : 'f', value : env.clickRadius } ,
        clickPosition: { type : 'v2', value : env.clickPosition } ,
    } ,
    targets : { ocolor : { location : 0 , target : env.scolor0 } }
} ) ;

var clickCopy = new Abubu.Copy( env.scolor0, env.fcolor0 ) ;

new Abubu.MouseListener({
    canvas : canvas_1 ,
    event : 'drag' ,
    callback : function(e){
        click.uniforms.clickPosition.value = e.position ;
        click.render() ;
        clickCopy.render() ;
    }
} ) ;


env.initialize = function(){
    env.time = 0 ;
    init.render() ;
    plot.init() ;
}

env.solve = function(){
    env.running = !env.running ;
    return ;
}

function createGui(){
    gui = new dat.GUI({width:300}) ;
    
    var mod = gui.addFolder('Model param') ;

    var exe = gui.addFolder('Execution') ;
    exe.add(env,'time').name('Time').listen() ;
    exe.add(env,'skip').name('Skip Steps') ;
    exe.add(env,'dt').name('Delta t') ;
    exe.add(env,'initialize').name('Initialize') ;
    exe.add(env,'solve').name('Solve/Pause') ;
    exe.open() ;
}

createGui() ;
run() ;
