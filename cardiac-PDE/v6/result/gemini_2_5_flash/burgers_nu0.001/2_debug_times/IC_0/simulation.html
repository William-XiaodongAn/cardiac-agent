<script id='click' type='x-shader-fragment'>#version 300 es
precision highp float ;
precision highp int ;

uniform sampler2D   inTexture ;
uniform vec2    clickPosition ;
uniform float   clickRadius ;

in vec2 cc, pixPos ;

layout (location = 0) out vec4 ocolor ;

#define u   color.r

// Main body of the shader
void main() {
    vec2  size  = vec2(textureSize(inTexture, 0)) ;

    // read the color of the pixel .......................................
    vec4 color = texture( inTexture , cc ) ;

    if ( length(clickPosition - cc )< clickRadius ){
        u = 1. ;
    }

    // output the color of the pixel .....................................
    ocolor = color ;
    return ;
}

</script><script id='init' type='shader'>#version 300 es
precision highp float ;
precision highp int ;

in vec2 cc, pixPos ;

layout (location = 0) out vec4 color1 ;
layout (location = 1) out vec4 color2 ;

// Main body of the shader
void main() {
    vec4 color = vec4(0.) ;
    
    color.r = 0. ;
	color.g = 1. ;
	color.b = 1. ;

	color1 = color ;
    color2 = color ;


    return ;
}
</script>

<script id='march' type='shader'>#version 300 es
precision highp float ;
precision highp int ;

uniform sampler2D   inTexture ;
uniform float       dt, dx, dy;

in vec2 cc, pixPos ;

layout (location = 0) out vec4 ocolor ;

#define u       color.r
    const float nu = 0.001;
// No helper functions are needed as GLSL provides built-in abs() and max().

// Main body of the shader
void main() {
    vec2  size  = vec2(textureSize(inTexture, 0)) ;

    // ii represents the texture coordinate step corresponding to dx in the x-direction.
    vec2 ii = vec2(1.,0.)/size ;
    // jj represents the texture coordinate step corresponding to dy in the y-direction.
    // For a 1D PDE along x, dy and jj are typically not used.
    // vec2 jj = vec2(0.,1.)/size ; // Not used for 1D PDE along x

    // read the color of the pixel at the current texture coordinate (x_i, y_j)
    vec4 color = texture( inTexture , cc ) ;

    // Apply periodic boundary conditions for fetching neighbor values.
    // The fract function ensures coordinates wrap around from 0 to 1.
    vec2 prevX_coord = fract(cc - ii); // Coordinate for u(x_i - dx)
    vec2 nextX_coord = fract(cc + ii); // Coordinate for u(x_i + dx)

    // Read the 'u' values (red channel) from the current and neighboring pixels.
    float u_c = u; // u at current pixel (x_i)
    float u_prevX = texture(inTexture, prevX_coord).r; // u at x_{i-1}
    float u_nextX = texture(inTexture, nextX_coord).r; // u at x_{i+1}

    // Flux function F(u) = u^2/2 for Burgers' equation.
    float F_c = 0.5 * u_c * u_c;
    float F_prevX = 0.5 * u_prevX * u_prevX;
    float F_nextX = 0.5 * u_nextX * u_nextX;

    // --- Advection Term: - d/dx (u^2/2) using Rusanov (Local Lax-Friedrichs) Flux ---
    // The Rusanov scheme is a first-order, robust, and less diffusive alternative to the global Lax-Friedrichs scheme.
    // It's preferred for non-linear conservation laws like Burgers' equation to improve numerical accuracy (lower RMSE).

    // Calculate the maximum characteristic speed alpha for the right and left cell interfaces.
    // For Burgers' equation, F'(u) = u, so alpha is max(|u|) across the interface.
    float alpha_right = max(abs(u_c), abs(u_nextX)); // alpha at x_i+1/2
    float alpha_left = max(abs(u_prevX), abs(u_c));   // alpha at x_i-1/2

    // Calculate the Rusanov numerical fluxes at the cell interfaces.
    // F_hat_{i+1/2} = 0.5 * (F_i + F_{i+1}) - 0.5 * alpha_{i+1/2} * (u_{i+1} - u_i)
    float F_hat_right = 0.5 * (F_c + F_nextX) - 0.5 * alpha_right * (u_nextX - u_c); // Numerical flux at x_i+1/2
    float F_hat_left = 0.5 * (F_prevX + F_c) - 0.5 * alpha_left * (u_c - u_prevX);   // Numerical flux at x_i-1/2

    // Calculate the spatial derivative of the numerical flux.
    // This approximates -d/dx F(u).
    float advection_term = -(F_hat_right - F_hat_left) / dx;

    // --- Diffusion Term: nu * d^2u/dx^2 ---
    // We approximate the second spatial derivative of u using central difference: (u_{i+1} - 2*u_i + u_{i-1}) / dx^2.
    // This part remains the same as it's a standard second-order central difference.
    float d2u_dx2 = (u_nextX - 2.0 * u_c + u_prevX) / (dx * dx);
    float diffusion_term = nu * d2u_dx2;

    // --- Time Integration: Explicit Euler Forward scheme ---
    // u^{n+1}_i = u^n_i + dt * (Advection_term + Diffusion_term)
    // The explicit Euler method is applied to the sum of the advection and diffusion terms.
    float new_u = u_c + dt * (advection_term + diffusion_term);

    // Store the new 'u' value in the red channel of the output color.
    // The other color channels (green, blue, alpha) are preserved from the original pixel.
    ocolor = vec4(new_u, color.g, color.b, color.a);
    return ;
}
</script>

<script>
function source(id){
    return document.getElementById(id).text ;
}

var canvas_1 = document.getElementById('canvas_1') ;
canvas_1.style.left = "10px";
canvas_1.style.top = "10px";
canvas_1.style.position = "absolute";

var canvas_2 = document.getElementById('canvas_2') ;
canvas_2.style.left = "532px";
canvas_2.style.top = "10px";
canvas_2.style.position = "absolute";


// dont change anything here ............................................
var env = {
        dt : 9e-05 ,
        time : 0 ,
        dx : 0.0009765625,
        running : false ,
		width : 1024,
		height : 1024,
		clickRadius : 0.06 ,
		clickPosition  : [0.,0.] ,
		skip : 40,
  } ;
// ---------------------------------------------------------------


// defining the textures .................................................
env.fcolor0 = new Abubu.Float32Texture(env.width,env.height) ;
env.scolor0 = new Abubu.Float32Texture(env.width,env.height) ;
env.fcolor0.pairable = true ;
env.scolor0.pairable = true ;
var texture_num = 1;

env.fcolors = [] ;
env.scolors = [] ;
for(var i=0; i<1; i++){
    env['fcolor'+i] = new Abubu.Float32Texture( 
            env.width, env.height, { pairable : true } ) ;
    env['scolor'+i] = new Abubu.Float32Texture( 
            env.width, env.height, { pairable : true } ) ;
    env.fcolors.push(env['fcolor'+i]) ;
    env.scolors.push(env['scolor'+i]) ;
}

// Setup a solver ........................................................
var init = new Abubu.Solver( {
    fragmentShader  : source('init'),
    targets : {
        color1 : { location :0, target : env.fcolor0  } ,
        color2 : { location :1, target : env.scolor0  } ,
    }
} ) ;
init.render();

// post processing .......................................................
var plot = new Abubu.Plot2D({
    target : env.fcolor0,
    prevTarget: env.scolor0,
    channel : 'r',
    minValue : -1.0 ,
    maxValue : 1.0 ,
    colorbar : true ,
    probeVisible : true ,
    canvas : canvas_1 ,
}) ;
plot.init() ;
plot.render() ;

function marchUniforms(_inTexture){
    this.inTexture          = { type : 't', value : _inTexture          } ;
    this.dt                 = { type : 'f', value : env.dt              } ;
	this.dx                 = { type : 'f', value : env.dx          } ;
	this.dy                 = { type : 'f', value : env.dx          } ;
    return this ;
}

var fmarch = new Abubu.Solver({
        fragmentShader : source( 'march' ) ,
		uniforms : new marchUniforms( env.fcolor0 ) ,
        targets : { ocolor : { location : 0, target : env.scolor0 } }
    } ) ;

var smarch = new Abubu.Solver({
        fragmentShader : source( 'march' ) ,
  		uniforms : new marchUniforms( env.scolor0 ) ,
        targets : { ocolor : { location : 0, target : env.fcolor0 } }
    } ) ;

function march(){
    fmarch.render() ;
    env.time += env.dt ;
    smarch.render() ;
    env.time += env.dt ;
}

env.csvFileName = 'result.csv' ;
env.saveCsvFile = function() {
    data = env.fcolor0.value.toString() ;

    // 3. CRITICAL: Pass the array directly to the Blob. 
    // This avoids creating one giant mega-string in memory.
    const blob = new Blob([data], { type: 'text/csv;charset=utf-8' });

    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');

    const name_download = 'result.csv';

    link.href = url;
    link.download = name_download;

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    URL.revokeObjectURL(url); // Cleanup
};



//IC
const IC_url = './random_sample_t0.csv';
const T_end = 2;
//IC

function loadCsv(url) {
    // fetch starts the request and "promises" to get back to you
    fetch(url)
        .then(response => response.text()) // Convert the raw response to text
        .then(csvText => {
            // This code runs ONLY after the file is fully loaded
            processCsvData(csvText); 
        })
        .catch(error => console.error("Error:", error));
}

function processCsvData(result) {
    var data = result.split(',');
    var width = parseInt(data[0]);
    var height = parseInt(data[1]);

    var tabs = [];
    for (var i = 0; i < texture_num; i++) {
        tabs.push(new Float32Array(width * height * 4));
    }

    var p = 2;
    var indx;

    for (var i = 0; i < (width * height); i++) {
        indx = i * 4;
        for (var j = 0; j < texture_num; j++) {
            tabs[j][indx]     = parseFloat(data[p++]);
            tabs[j][indx + 1] = parseFloat(data[p++]);
            tabs[j][indx + 2] = parseFloat(data[p++]);
            tabs[j][indx + 3] = parseFloat(data[p++]);
        }
    }

    for (var j = 0; j < texture_num; j++) {
        env.fcolors[j].data = tabs[j];
        env.scolors[j].data = tabs[j];
    }
}

loadCsv(IC_url) ;

function run(){
    if (env.running){
        for(var i = 0 ; i<env.skip ; i++){

            if (env.time >= T_end){
                env.running = false ;
                console.log("Simulation finished!")
                env.saveCsvFile();
                break ;
            }
            march() ;
        }

    }
    plot.render() ;
    requestAnimationFrame(run) ;
}

// click solver ..........................................................
var click = new Abubu.Solver({
    fragmentShader : source( 'click' ) ,
    uniforms : {
        inTexture : { type : 't', value : env.fcolor0 } ,
        clickRadius: { type : 'f', value : env.clickRadius } ,
        clickPosition: { type : 'v2', value : env.clickPosition } ,
    } ,
    targets : { ocolor : { location : 0 , target : env.scolor0 } }
} ) ;

var clickCopy = new Abubu.Copy( env.scolor0, env.fcolor0 ) ;

new Abubu.MouseListener({
    canvas : canvas_1 ,
    event : 'drag' ,
    callback : function(e){
        click.uniforms.clickPosition.value = e.position ;
        click.render() ;
        clickCopy.render() ;
    }
} ) ;


env.initialize = function(){
    env.time = 0 ;
    init.render() ;
    plot.init() ;
}

env.solve = function(){
    env.running = !env.running ;
    return ;
}

function createGui(){
    gui = new dat.GUI({width:300}) ;
    
    var mod = gui.addFolder('Model param') ;

    var exe = gui.addFolder('Execution') ;
    exe.add(env,'time').name('Time').listen() ;
    exe.add(env,'skip').name('Skip Steps') ;
    exe.add(env,'dt').name('Delta t') ;
    exe.add(env,'initialize').name('Initialize') ;
    exe.add(env,'solve').name('Solve/Pause') ;
    exe.open() ;
}

createGui() ;
run() ;

</script>
</body>
</html>
