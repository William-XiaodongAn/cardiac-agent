<script id='click' type='x-shader-fragment'>#version 300 es
precision highp float ;
precision highp int ;

uniform sampler2D   inTexture ;
uniform vec2    clickPosition ;
uniform float   clickRadius ;

in vec2 cc, pixPos ;

layout (location = 0) out vec4 ocolor ;

#define u   color.r

// Main body of the shader
void main() {
    vec2  size  = vec2(textureSize(inTexture, 0)) ;

    // read the color of the pixel .......................................
    vec4 color = texture( inTexture , cc ) ;

    if ( length(clickPosition - cc )< clickRadius ){
        u = 1. ;
    }

    // output the color of the pixel .....................................
    ocolor = color ;
    return ;
}

</script><script id='init' type='shader'>#version 300 es
precision highp float ;
precision highp int ;

in vec2 cc, pixPos ;

layout (location = 0) out vec4 color1 ;
layout (location = 1) out vec4 color2 ;

// Main body of the shader
void main() {
    vec4 color = vec4(0.) ;
    
    color.r = 0. ;
	color.g = 1. ;
	color.b = 1. ;

	color1 = color ;
    color2 = color ;


    return ;
}
</script>

<script id='march' type='shader'>#version 300 es

precision highp float ;
precision highp int ;

uniform sampler2D   inTexture ;
uniform float       dt, dx, dy;

in vec2 cc, pixPos ;

layout (location = 0) out vec4 ocolor ;

#define u       color.r
    const float nu = 0.001;

// Helper function to calculate the convective term d/dx(u^2/2).
// This is approximated using a second-order central difference scheme.
// For the convective part of Burgers' equation, central differencing is a common
// approach that offers second-order accuracy. While it can be prone to oscillations
// (dispersive errors) in purely hyperbolic problems, the presence of the physical
// viscous term in the Burgers' equation helps to damp these oscillations,
// making this a more accurate choice than first-order upwind schemes which
// suffer from excessive numerical diffusion.
float convectiveTerm(float u_plus, float u_current, float u_minus) {
    // The convective term is the spatial derivative of the flux F(u) = 0.5 * u^2.
    // We calculate the flux at the neighboring points i+1 and i-1.
    float flux_plus  = 0.5 * u_plus * u_plus;
    float flux_minus = 0.5 * u_minus * u_minus;

    // Approximate the derivative dF/dx using the central difference formula:
    // (F_{i+1} - F_{i-1}) / (2 * dx).
    // This provides a second-order accurate approximation of the convective term.
    return (flux_plus - flux_minus) / (2.0 * dx);
}

// Helper function to calculate the viscous (diffusion) term nu * d^2u/dx^2
// This is approximated using a second-order central difference for the second derivative.
// This term models the dissipation of energy, smoothing out sharp gradients.
float viscousTerm(float u_plus, float u_current, float u_minus) {
    // Approximate d^2u/dx^2 as (u_{i+1} - 2*u_i + u_{i-1}) / dx^2
    float d2u_dx2 = (u_plus - 2.0 * u_current + u_minus) / (dx * dx);
    
    // Return the full viscous term
    return nu * d2u_dx2;
}

// Main body of the shader
void main() {
    vec2  size  = vec2(textureSize(inTexture, 0)) ;

    // Define the step vector for one pixel in the x-direction in texture coordinates.
    // This represents the spatial discretization step.
    vec2 ii = vec2(1.,0.)/size ;
    vec2 jj = vec2(0.,1.)/size ;

    // Read the color of the current pixel, which holds the value of u at grid point i.
    vec4 color = texture( inTexture , cc ) ;

    // Use fract for periodic boundary conditions.
    // This wraps the texture coordinates, so sampling beyond the edge wraps to the opposite side.
    // Fetch the state 'u' from the neighboring pixels to the right (i+1) and left (i-1).
    vec4 color_plus  = texture(inTexture, fract(cc + ii));
    vec4 color_minus = texture(inTexture, fract(cc - ii));

    // Extract the scalar field 'u' from the red channel of the fetched colors.
    float u_c = u;              // u at current point i
    float u_p = color_plus.r;   // u at right point i+1
    float u_m = color_minus.r;  // u at left point i-1

    // Calculate the spatial derivatives using the helper functions.
    // The PDE is du/dt = -convection + diffusion.
    float conv = convectiveTerm(u_p, u_c, u_m);
    float diff = viscousTerm(u_p, u_c, u_m);

    // Update the solution in time using the explicit Forward Euler method.
    // u_new = u_current + dt * (du/dt)
    float u_new = u_c + dt * (diff - conv);

    // Write the new value of u to the output color's red channel.
    // Preserve the other channels (g, b, a) from the original texture.
    ocolor = vec4(u_new, color.gba);
    return ;
}

</script>

<script>
function source(id){
    return document.getElementById(id).text ;
}

var canvas_1 = document.getElementById('canvas_1') ;
canvas_1.style.left = "10px";
canvas_1.style.top = "10px";
canvas_1.style.position = "absolute";

var canvas_2 = document.getElementById('canvas_2') ;
canvas_2.style.left = "532px";
canvas_2.style.top = "10px";
canvas_2.style.position = "absolute";


// dont change anything here ............................................
var env = {
        dt : 5e-05 ,
        time : 0 ,
        dx : 0.0009765625,
        running : false ,
		width : 1024,
		height : 1024,
		clickRadius : 0.06 ,
		clickPosition  : [0.,0.] ,
		skip : 40,
  } ;
// ---------------------------------------------------------------


// defining the textures .................................................
env.fcolor0 = new Abubu.Float32Texture(env.width,env.height) ;
env.scolor0 = new Abubu.Float32Texture(env.width,env.height) ;
env.fcolor0.pairable = true ;
env.scolor0.pairable = true ;
var texture_num = 1;

env.fcolors = [] ;
env.scolors = [] ;
for(var i=0; i<1; i++){
    env['fcolor'+i] = new Abubu.Float32Texture( 
            env.width, env.height, { pairable : true } ) ;
    env['scolor'+i] = new Abubu.Float32Texture( 
            env.width, env.height, { pairable : true } ) ;
    env.fcolors.push(env['fcolor'+i]) ;
    env.scolors.push(env['scolor'+i]) ;
}

// Setup a solver ........................................................
var init = new Abubu.Solver( {
    fragmentShader  : source('init'),
    targets : {
        color1 : { location :0, target : env.fcolor0  } ,
        color2 : { location :1, target : env.scolor0  } ,
    }
} ) ;
init.render();

// post processing .......................................................
var plot = new Abubu.Plot2D({
    target : env.fcolor0,
    prevTarget: env.scolor0,
    channel : 'r',
    minValue : -1.0 ,
    maxValue : 1.0 ,
    colorbar : true ,
    probeVisible : true ,
    canvas : canvas_1 ,
}) ;
plot.init() ;
plot.render() ;

function marchUniforms(_inTexture){
    this.inTexture          = { type : 't', value : _inTexture          } ;
    this.dt                 = { type : 'f', value : env.dt              } ;
	this.dx                 = { type : 'f', value : env.dx          } ;
	this.dy                 = { type : 'f', value : env.dx          } ;
    return this ;
}

var fmarch = new Abubu.Solver({
        fragmentShader : source( 'march' ) ,
		uniforms : new marchUniforms( env.fcolor0 ) ,
        targets : { ocolor : { location : 0, target : env.scolor0 } }
    } ) ;

var smarch = new Abubu.Solver({
        fragmentShader : source( 'march' ) ,
  		uniforms : new marchUniforms( env.scolor0 ) ,
        targets : { ocolor : { location : 0, target : env.fcolor0 } }
    } ) ;

function march(){
    fmarch.render() ;
    env.time += env.dt ;
    smarch.render() ;
    env.time += env.dt ;
}

env.csvFileName = 'result.csv' ;
env.saveCsvFile = function() {
    data = env.fcolor0.value.toString() ;

    // 3. CRITICAL: Pass the array directly to the Blob. 
    // This avoids creating one giant mega-string in memory.
    const blob = new Blob([data], { type: 'text/csv;charset=utf-8' });

    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');

    const name_download = 'result.csv';

    link.href = url;
    link.download = name_download;

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    URL.revokeObjectURL(url); // Cleanup
};



//IC
const IC_url = './random_sample_t0.csv';
const T_end = 2;
//IC

function loadCsv(url) {
    // fetch starts the request and "promises" to get back to you
    fetch(url)
        .then(response => response.text()) // Convert the raw response to text
        .then(csvText => {
            // This code runs ONLY after the file is fully loaded
            processCsvData(csvText); 
        })
        .catch(error => console.error("Error:", error));
}

function processCsvData(result) {
    var data = result.split(',');
    var width = parseInt(data[0]);
    var height = parseInt(data[1]);

    var tabs = [];
    for (var i = 0; i < texture_num; i++) {
        tabs.push(new Float32Array(width * height * 4));
    }

    var p = 2;
    var indx;

    for (var i = 0; i < (width * height); i++) {
        indx = i * 4;
        for (var j = 0; j < texture_num; j++) {
            tabs[j][indx]     = parseFloat(data[p++]);
            tabs[j][indx + 1] = parseFloat(data[p++]);
            tabs[j][indx + 2] = parseFloat(data[p++]);
            tabs[j][indx + 3] = parseFloat(data[p++]);
        }
    }

    for (var j = 0; j < texture_num; j++) {
        env.fcolors[j].data = tabs[j];
        env.scolors[j].data = tabs[j];
    }
}

loadCsv(IC_url) ;

function run(){
    if (env.running){
        for(var i = 0 ; i<env.skip ; i++){

            if (env.time >= T_end){
                env.running = false ;
                console.log("Simulation finished!")
                env.saveCsvFile();
                break ;
            }
            march() ;
        }

    }
    plot.render() ;
    requestAnimationFrame(run) ;
}

// click solver ..........................................................
var click = new Abubu.Solver({
    fragmentShader : source( 'click' ) ,
    uniforms : {
        inTexture : { type : 't', value : env.fcolor0 } ,
        clickRadius: { type : 'f', value : env.clickRadius } ,
        clickPosition: { type : 'v2', value : env.clickPosition } ,
    } ,
    targets : { ocolor : { location : 0 , target : env.scolor0 } }
} ) ;

var clickCopy = new Abubu.Copy( env.scolor0, env.fcolor0 ) ;

new Abubu.MouseListener({
    canvas : canvas_1 ,
    event : 'drag' ,
    callback : function(e){
        click.uniforms.clickPosition.value = e.position ;
        click.render() ;
        clickCopy.render() ;
    }
} ) ;


env.initialize = function(){
    env.time = 0 ;
    init.render() ;
    plot.init() ;
}

env.solve = function(){
    env.running = !env.running ;
    return ;
}

function createGui(){
    gui = new dat.GUI({width:300}) ;
    
    var mod = gui.addFolder('Model param') ;

    var exe = gui.addFolder('Execution') ;
    exe.add(env,'time').name('Time').listen() ;
    exe.add(env,'skip').name('Skip Steps') ;
    exe.add(env,'dt').name('Delta t') ;
    exe.add(env,'initialize').name('Initialize') ;
    exe.add(env,'solve').name('Solve/Pause') ;
    exe.open() ;
}

createGui() ;
run() ;

</script>
</body>
</html>
