<!doctype html>
<html>
<head>
    <script src='https://abubujs.org/libs/Abubu.latest.js' type='text/javascript'></script>
    <script src='https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js'></script>
</head>
<body>
    <canvas id="canvas_1" width="512" height="512" style="border: 1px solid black"></canvas>
    <canvas id="canvas_2" width="512" height="256" style="display:none;"></canvas>

<script id="init" type="x-shader-fragment">#version 300 es
precision highp float;
layout (location = 0) out vec4 color1;
layout (location = 1) out vec4 color2;
void main() {
    vec4 color = vec4(0., 1., 1., 1.); // Initial u=0, v=1
    color1 = color;
    color2 = color;
}
</script>

<script id="march" type="x-shader-fragment">#version 300 es
precision highp float;
precision highp int;

uniform sampler2D inTexture;
uniform float dt, dx, dy;

in vec2 cc, pixPos;
layout (location = 0) out vec4 ocolor;

const float D_u = 0.001;
const float D_v = 0.005;
const float k = 0.005;

void main() {
    vec2 size = vec2(textureSize(inTexture, 0));
    vec2 ii = vec2(1.0, 0.0) / size;
    vec2 jj = vec2(0.0, 1.0) / size;

    vec4 current_color = texture(inTexture, cc);
    float u_curr = current_color.r;
    float v_curr = current_color.g;

    // Neighbors
    vec4 color_L = texture(inTexture, cc - ii);
    vec4 color_R = texture(inTexture, cc + ii);
    vec4 color_D = texture(inTexture, cc - jj);
    vec4 color_U = texture(inTexture, cc + jj);

    // Neumann Boundary Conditions
    if (pixPos.x < 1.0) color_L = color_R;
    if (pixPos.x > size.x - 2.0) color_R = color_L;
    if (pixPos.y < 1.0) color_D = color_U;
    if (pixPos.y > size.y - 2.0) color_U = color_D;

    // Laplacian
    float lap_u = (color_L.r - 2.0 * u_curr + color_R.r) / (dx * dx) +
                  (color_D.r - 2.0 * u_curr + color_U.r) / (dy * dy);
    float lap_v = (color_L.g - 2.0 * v_curr + color_R.g) / (dx * dx) +
                  (color_D.g - 2.0 * v_curr + color_U.g) / (dy * dy);

    // Derivatives
    float du_dt = D_u * lap_u + u_curr - pow(u_curr, 3.0) - k - v_curr;
    float dv_dt = D_v * lap_v + u_curr - v_curr;

    // Explicit Euler update
    float u_new = u_curr + dt * du_dt;
    float v_new = v_curr + dt * dv_dt;

    ocolor = vec4(u_new, v_new, current_color.b, current_color.a);
}
</script>

<script>
// --- DEBUGGED SOURCE FUNCTION ---
function source(id){
    var element = document.getElementById(id);
    if (!element) {
        console.error("Shader element not found: " + id);
        return "";
    }
    return element.textContent || element.innerText; 
}

var env = {
    dt : 0.00008, 
    time : 0,
    dx : 0.015625,
    running : false,
    width : 128,
    height : 128,
    skip : 50,
};

var canvas_1 = document.getElementById('canvas_1');
canvas_1.style.position = "absolute";
canvas_1.style.left = "10px";
canvas_1.style.top = "10px";

// Textures
env.fcolor0 = new Abubu.Float32Texture(env.width, env.height, { pairable: true });
env.scolor0 = new Abubu.Float32Texture(env.width, env.height, { pairable: true });

// Solver Initialization
var init = new Abubu.Solver({
    fragmentShader : source('init'), // FIXED: matched ID
    targets : {
        color1 : { location : 0, target : env.fcolor0 },
        color2 : { location : 1, target : env.scolor0 }
    }
});
init.render();

// Solvers for Marching
var fmarch = new Abubu.Solver({
    fragmentShader : source('march'), // FIXED: matched ID
    uniforms : {
        inTexture : { type : 't', value : env.fcolor0 },
        dt : { type : 'f', value : env.dt },
        dx : { type : 'f', value : env.dx },
        dy : { type : 'f', value : env.dx }
    },
    targets : { ocolor : { location : 0, target : env.scolor0 } }
});

var smarch = new Abubu.Solver({
    fragmentShader : source('march'),
    uniforms : {
        inTexture : { type : 't', value : env.scolor0 },
        dt : { type : 'f', value : env.dt },
        dx : { type : 'f', value : env.dx },
        dy : { type : 'f', value : env.dx }
    },
    targets : { ocolor : { location : 0, target : env.fcolor0 } }
});

function march(){
    fmarch.render();
    env.time += env.dt;
    smarch.render();
    env.time += env.dt;
}

// Visuals
var plot = new Abubu.Plot2D({
    target : env.fcolor0,
    channel : 'r',
    minValue : -1.0,
    maxValue : 1.0,
    colorbar : true,
    canvas : canvas_1
});
plot.init();

// CSV Logic
env.saveCsvFile = function() {
    const data = env.fcolor0.value.toString();
    const blob = new Blob([data], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'result.csv';
    link.click();
    URL.revokeObjectURL(url);
};

function loadCsv(url) {
    fetch(url)
        .then(res => res.text())
        .then(csv => {
            let data = csv.split(',');
            let w = parseInt(data[0]);
            let h = parseInt(data[1]);
            let tab = new Float32Array(w * h * 4);
            let p = 2;
            for (let i = 0; i < (w * h); i++) {
                let idx = i * 4;
                tab[idx] = parseFloat(data[p++]);
                tab[idx+1] = parseFloat(data[p++]);
                tab[idx+2] = parseFloat(data[p++]);
                tab[idx+3] = parseFloat(data[p++]);
            }
            env.fcolor0.data = tab;
            env.scolor0.data = tab;
        }).catch(e => console.log("IC file not found, using default init."));
}

loadCsv('IC_0.csv');

function run(){
    if (env.running){
        for(let i = 0; i < env.skip; i++){
            if (env.time >= 1.0){
                env.running = false;
                env.saveCsvFile();
                break;
            }
            march();
        }
    }
    plot.render();
    requestAnimationFrame(run);
}

// GUI
var gui = new dat.GUI();
gui.add(env, 'time').listen();
gui.add(env, 'dt').name('Delta t');
gui.add(env, 'running').name('Solve/Pause');
gui.add(env, 'saveCsvFile').name('Export CSV');

run();
</script>
</body>
</html>
