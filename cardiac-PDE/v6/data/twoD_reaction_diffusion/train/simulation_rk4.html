<!doctype html>
<html>
<head>
    <script src='https://abubujs.org/libs/Abubu.latest.js' type='text/javascript'></script>
    <script src='https://cdn.jsdelivr.net/npm/dat.gui@0.7.9/build/dat.gui.min.js'></script>
</head>
<body>
    <canvas id=canvas_1 width=512 height=512 style="border: 1px solid black">Your browser doesn't support HTML5.0</canvas>
    <canvas id=canvas_2 width=512 height=256 style="border: 1px solid black">Your browser doesn't support HTML5.0</canvas>

<script id='click' type='x-shader-fragment'>#version 300 es
precision highp float ;
uniform sampler2D inTexture ;
uniform vec2 clickPosition ;
uniform float clickRadius ;
in vec2 cc;
layout (location = 0) out vec4 ocolor ;
void main() {
    vec4 color = texture( inTexture , cc ) ;
    if ( length(clickPosition - cc ) < clickRadius ) color.r = 1. ;
    ocolor = color ;
}
</script>

<script id='init' type='shader'>#version 300 es
precision highp float ;
layout (location = 0) out vec4 color1 ;
layout (location = 1) out vec4 color2 ;
void main() {
    vec4 color = vec4(0., 1., 1., 1.) ;
	color1 = color ;
    color2 = color ;
}
</script>

<script id='march' type='shader'>#version 300 es
precision highp float;
uniform sampler2D inTexture;
uniform float dx, dy;
in vec2 cc;
layout (location = 0) out vec4 derivative;

const float D_u = 0.001;
const float D_v = 0.005;
const float k   = 0.005;

void main() {
    vec2 size = vec2(textureSize(inTexture, 0));
    vec2 ii = vec2(1.0, 0.0) / size;
    vec2 jj = vec2(0.0, 1.0) / size;

    vec4 color = texture(inTexture, cc);
    float u_val = color.r;
    float v_val = color.g;

    vec2 ccL = clamp(cc - ii, 0.0, 1.0);
    vec2 ccR = clamp(cc + ii, 0.0, 1.0);
    vec2 ccD = clamp(cc - jj, 0.0, 1.0);
    vec2 ccU = clamp(cc + jj, 0.0, 1.0);

    float lapU = (texture(inTexture, ccL).r - 2.0 * u_val + texture(inTexture, ccR).r) / (dx * dx) + 
                 (texture(inTexture, ccD).r - 2.0 * u_val + texture(inTexture, ccU).r) / (dy * dy);
    
    float lapV = (texture(inTexture, ccL).g - 2.0 * v_val + texture(inTexture, ccR).g) / (dx * dx) + 
                 (texture(inTexture, ccD).g - 2.0 * v_val + texture(inTexture, ccU).g) / (dy * dy);

    float du = D_u * lapU + u_val - u_val * u_val * u_val - k - v_val;
    float dv = D_v * lapV + u_val - v_val;

    derivative = vec4(du, dv, 0.0, 1.0);
}
</script>

<script id='rk4_step' type='shader'>#version 300 es
precision highp float;
uniform sampler2D uState, uDeriv;
uniform float dt_factor;
in vec2 cc;
layout (location = 0) out vec4 ocolor;
void main() {
    ocolor = texture(uState, cc) + dt_factor * texture(uDeriv, cc);
}
</script>

<script id='rk4_final' type='shader'>#version 300 es
precision highp float;
uniform sampler2D uState, uK1, uK2, uK3, uK4;
uniform float dt;
in vec2 cc;
layout (location = 0) out vec4 ocolor;
void main() {
    vec4 y = texture(uState, cc);
    vec4 k1 = texture(uK1, cc);
    vec4 k2 = texture(uK2, cc);
    vec4 k3 = texture(uK3, cc);
    vec4 k4 = texture(uK4, cc);
    ocolor = y + (dt / 6.0) * (k1 + 2.0*k2 + 2.0*k3 + k4);
}
</script>

<script>
function source(id){ return document.getElementById(id).text ; }

var canvas_1 = document.getElementById('canvas_1') ;
canvas_1.style.left = "10px"; canvas_1.style.top = "10px"; canvas_1.style.position = "absolute";
var canvas_2 = document.getElementById('canvas_2') ;
canvas_2.style.left = "532px"; canvas_2.style.top = "10px"; canvas_2.style.position = "absolute";

var env = {
    dt : 0.01, 
    time : 0 ,
    dx : 0.015625,
    running : false ,
    width : 128,
    height : 128,
    clickRadius : 0.06 ,
    clickPosition  : [0.,0.] ,
    skip : 10,
    csvFileName : 'result.csv'
} ;

// TEXTURES
env.fcolor0 = new Abubu.Float32Texture(env.width, env.height, {pairable: true});
env.scolor0 = new Abubu.Float32Texture(env.width, env.height, {pairable: true});
env.tempState = new Abubu.Float32Texture(env.width, env.height);
env.k1 = new Abubu.Float32Texture(env.width, env.height);
env.k2 = new Abubu.Float32Texture(env.width, env.height);
env.k3 = new Abubu.Float32Texture(env.width, env.height);
env.k4 = new Abubu.Float32Texture(env.width, env.height);

var texture_num = 1;
env.fcolors = [env.fcolor0];
env.scolors = [env.scolor0];

// SOLVERS
var init = new Abubu.Solver({
    fragmentShader: source('init'),
    targets: { color1: { location: 0, target: env.fcolor0 }, color2: { location: 1, target: env.scolor0 } }
});
init.render();

var getDeriv = new Abubu.Solver({
    fragmentShader: source('march'),
    uniforms: { 
        inTexture: { type: 't', value: env.fcolor0 },
        dx: { type: 'f', value: env.dx },
        dy: { type: 'f', value: env.dx }
    },
    targets: { ocolor: { location: 0, target: env.k1 } }
});

var stepState = new Abubu.Solver({
    fragmentShader: source('rk4_step'),
    uniforms: {
        uState: { type: 't', value: env.fcolor0 },
        uDeriv: { type: 't', value: env.k1 },
        dt_factor: { type: 'f', value: 0.5 * env.dt }
    },
    targets: { ocolor: { location: 0, target: env.tempState } }
});

var finalizeRK4 = new Abubu.Solver({
    fragmentShader: source('rk4_final'),
    uniforms: {
        uState: { type: 't', value: env.fcolor0 },
        uK1: { type: 't', value: env.k1 },
        uK2: { type: 't', value: env.k2 },
        uK3: { type: 't', value: env.k3 },
        uK4: { type: 't', value: env.k4 },
        dt: { type: 'f', value: env.dt }
    },
    targets: { ocolor: { location: 0, target: env.scolor0 } }
});

var copyResult = new Abubu.Copy(env.scolor0, env.fcolor0);

function march() {
    // k1 = f(y_n)
    getDeriv.uniforms.inTexture.value = env.fcolor0;
    getDeriv.targets.ocolor.target = env.k1;
    getDeriv.render();

    // k2 = f(y_n + 0.5*dt*k1)
    stepState.uniforms.uDeriv.value = env.k1;
    stepState.uniforms.dt_factor.value = 0.5 * env.dt;
    stepState.render(); 
    getDeriv.uniforms.inTexture.value = env.tempState;
    getDeriv.targets.ocolor.target = env.k2;
    getDeriv.render();

    // k3 = f(y_n + 0.5*dt*k2)
    stepState.uniforms.uDeriv.value = env.k2;
    stepState.render();
    getDeriv.uniforms.inTexture.value = env.tempState;
    getDeriv.targets.ocolor.target = env.k3;
    getDeriv.render();

    // k4 = f(y_n + dt*k3)
    stepState.uniforms.uDeriv.value = env.k3;
    stepState.uniforms.dt_factor.value = env.dt;
    stepState.render();
    getDeriv.uniforms.inTexture.value = env.tempState;
    getDeriv.targets.ocolor.target = env.k4;
    getDeriv.render();

    finalizeRK4.uniforms.dt.value = env.dt;
    finalizeRK4.render();
    copyResult.render();
    env.time += env.dt;
}

// RETAINED FEATURES: CSV SAVE
env.saveCsvFile = function() {
    data = env.fcolor0.value.toString() ;
    const blob = new Blob([data], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = env.csvFileName;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
};

// RETAINED FEATURES: CSV LOAD
const IC_url = 'IC_0.csv';
const T_end = 10.0;

function loadCsv(url) {
    fetch(url)
        .then(response => response.text())
        .then(csvText => { processCsvData(csvText); })
        .catch(error => console.error("Error:", error));
}

function processCsvData(result) {
    var data = result.split(',');
    var width = parseInt(data[0]);
    var height = parseInt(data[1]);
    var tabs = [new Float32Array(width * height * 4)];
    var p = 2;
    for (var i = 0; i < (width * height); i++) {
        var indx = i * 4;
        tabs[0][indx]     = parseFloat(data[p++]);
        tabs[0][indx + 1] = parseFloat(data[p++]);
        tabs[0][indx + 2] = parseFloat(data[p++]);
        tabs[0][indx + 3] = parseFloat(data[p++]);
    }
    env.fcolors[0].data = tabs[0];
    env.scolors[0].data = tabs[0];
}
loadCsv(IC_url);

// INTERACTION & PLOT
var plot = new Abubu.Plot2D({
    target : env.fcolor0, channel : 'r', minValue : -1.0, maxValue : 1.0,
    colorbar : true, canvas : canvas_1
});
plot.init();

var click = new Abubu.Solver({
    fragmentShader : source('click'),
    uniforms : {
        inTexture : { type : 't', value : env.fcolor0 },
        clickRadius: { type : 'f', value : env.clickRadius },
        clickPosition: { type : 'v2', value : env.clickPosition },
    },
    targets : { ocolor : { location : 0 , target : env.scolor0 } }
});
var clickCopy = new Abubu.Copy(env.scolor0, env.fcolor0);

new Abubu.MouseListener({
    canvas : canvas_1, event : 'drag',
    callback : function(e){
        click.uniforms.clickPosition.value = e.position;
        click.render(); clickCopy.render();
    }
});

function run(){
    if (env.running){
        for(var i=0; i<env.skip; i++) {
            if (env.time >= T_end){
                env.running = false;
                env.saveCsvFile();
                break;
            }
            march();
        }
    }
    plot.render();
    requestAnimationFrame(run);
}

env.initialize = function(){ env.time = 0; init.render(); plot.init(); }
env.solve = function(){ env.running = !env.running; }

// GUI
var gui = new dat.GUI({width:300});
var exe = gui.addFolder('Execution');
exe.add(env,'time').name('Time').listen();
exe.add(env,'skip').name('Skip Steps');
exe.add(env,'dt').name('Delta t');
exe.add(env,'initialize').name('Initialize');
exe.add(env,'solve').name('Solve/Pause');
exe.open();

run();
</script>
</body>
</html>
